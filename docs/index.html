<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="Dashboard di gestione materiali e tecnici per cantieri FTTH — TechnicalWork.">
<meta name="theme-color" content="#020617">
<title>TechnicalWork — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-DiZf6jzW.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Blhoflmv.css">
<link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<!-- CONFIRM MODAL -->
<div id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon">⚠️</div>
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="confirm-btn-cancel" id="confirm-cancel">Annulla</button>
      <button class="confirm-btn-ok" id="confirm-ok">Conferma</button>
    </div>
  </div>
</div>

<!-- RENAME MODAL -->
<div id="rename-overlay" role="dialog" aria-modal="true" aria-labelledby="rename-title">
  <div class="confirm-box">
    <div class="confirm-icon" id="rename-icon">✏️</div>
    <div class="confirm-title" id="rename-title"></div>
    <div class="confirm-msg" id="rename-msg" style="display:none"></div>
    <input type="text" id="rename-input" class="rename-field" autocomplete="off" spellcheck="false">
    <div class="confirm-actions">
      <button class="confirm-btn-cancel" id="rename-cancel">Annulla</button>
      <button class="confirm-btn-ok btn-accent" id="rename-ok">Rinomina</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TechnicalWork</div>
    <div class="login-title">Accesso Dashboard</div>
    <div class="login-field">
      <label for="inp-user">Username</label>
      <input type="text" id="inp-user" placeholder="username" autocomplete="off">
    </div>
    <div class="login-field">
      <label for="inp-pass">Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-error" id="login-error">Credenziali non valide.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- OFFLINE BANNER -->
  <div id="offline-banner">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    Connessione assente — i dati potrebbero non essere aggiornati
  </div>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleDrawer()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="topbar-brand">
      <span class="text-gradient">TW</span><span class="topbar-brand-sub"> // Dashboard</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-appalto">Appalto: <span id="tb-appalto">—</span></div>
    
    <div class="topbar-status">
      <div class="status-dot"></div>
      <span>Live</span>
    </div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Cambia tema" aria-label="Cambia tema chiaro/scuro">🌙</button>
    <div class="topbar-user" id="tb-user" role="button" tabindex="0" onclick="doLogout()" onkeydown="if(event.key==='Enter'||event.key===' ')doLogout()">Esci</div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeDrawer()"></div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar" aria-label="Navigazione appalti">
      <div class="sidebar-header-mobile">
        <div class="sidebar-label">Appalti</div>
        <button class="menu-close" onclick="closeDrawer()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div id="sidebar-appalti"></div>

      <div class="sidebar-footer">
        <button class="btn-outline" onclick="refreshData()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
          Aggiorna
        </button>
      </div>

      <div id="nav-tecnici-wrapper" style="display:none; margin-top:8px; border-top:1px solid var(--border); padding-top:16px;">
        <div class="sidebar-label" style="margin-bottom:12px">Gestione</div>
        <a href="#/admin/tecnici" class="sidebar-item" onclick="closeDrawer()" id="nav-Tecnici" role="button" tabindex="0">
          <div class="sidebar-item-left">
            <div class="dot-indicator"></div>
            Tecnici
          </div>
        </a>
        <a href="#/admin/pfs" class="sidebar-item" onclick="closeDrawer()" id="nav-pfs" role="button" tabindex="0">
          <div class="sidebar-item-left">
            <div class="dot-indicator"></div>
            Segnalazioni PFS
          </div>
        </a>
      </div>
    </nav>

    <!-- CONTENT -->
    <main class="content" id="content">
      <div class="state-box fade-in">
        <div class="loader-spinner"></div>
        <p>Connessione a Firestore…</p>
      </div>
    </main>

  </div>
</div>

<!-- APP MODULE (single entry point) -->

</body>
</html>
